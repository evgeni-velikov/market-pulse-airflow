services:

  # ---------------------------
  # dbt
  # ---------------------------
  dbt:
    image: crypto-pulse-dbt:latest
    build:
      context: .
      dockerfile: docker/dbt/Dockerfile
    volumes:
      - ./dbt:/dbt
      - ./dbt/profiles:/root/.dbt
    env_file:
      - .env

  # ---------------------------
  # Airflow metadata DB - LOCAL only
  # ---------------------------
  airflow-postgres:
    image: postgres:15
    profiles:
      - local
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ---------------------------
  # Airflow init
  # ---------------------------
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username admin \
      --password admin \
      --firstname admin \
      --lastname admin \
      --role Admin \
      --email admin@example.com"
    restart: "no"

  # ---------------------------
  # Airflow webserver
  # ---------------------------
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: webserver
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ---------------------------
  # Airflow scheduler
  # ---------------------------
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: scheduler
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow:
        condition: service_started
    restart: always

  # ---------------------------
  # Airflow triggerer
  # ---------------------------
  airflow-triggerer:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: triggerer
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow:
        condition: service_started
    restart: always

volumes:
  postgres-data:

networks:
  default:
    name: market-pulse-airflow
